<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D P2P Hide & Hunt</title>
    <style>
        :root {
            --bg-color: #121214; --panel-color: #1a1a24;
            --accent-red: #ff4757; --accent-green: #2ed573; --accent-blue: #1e90ff;
            --text-main: #ffffff; --text-muted: #a4b0be;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        
        body {
            background: var(--bg-color); color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            overflow: hidden; position: fixed; width: 100%; height: 100%;
        }

        /* --- UI Overlays --- */
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10; pointer-events: none; display: none;
            flex-direction: column; justify-content: space-between; padding: 15px;
        }

        .interactive { pointer-events: auto; }

        .menu-screen {
            position: absolute; inset: 0; background: #121214; z-index: 20;
            display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px;
        }

        .menu-card {
            background: var(--panel-color); width: 100%; max-width: 400px;
            padding: 25px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center; border: 1px solid #2f3542;
        }

        h1 { font-size: 2rem; color: var(--accent-red); margin-bottom: 5px; text-transform: uppercase; }
        h2 { font-size: 1.5rem; margin-bottom: 10px; }
        p { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 20px; }

        .form-group { display: flex; flex-direction: column; gap: 12px; margin-top: 15px; }

        input {
            background: #09090b; border: 2px solid #2f3542; padding: 14px;
            border-radius: 8px; color: white; font-size: 1.1rem; text-align: center;
        }
        input:focus { border-color: var(--accent-blue); outline: none; }

        button {
            background: var(--accent-red); color: white; border: none; padding: 14px;
            border-radius: 8px; font-size: 1rem; font-weight: bold; cursor: pointer;
        }
        button:disabled { background: #2f3542 !important; color: #57606f; cursor: not-allowed; }
        button:active:not(:disabled) { transform: scale(0.98); }
        button.secondary { background: #2f3542; }
        button.success { background: var(--accent-green); }
        button.leave { background: rgba(255, 71, 87, 0.2); color: var(--accent-red); border: 1px solid var(--accent-red); padding: 8px 15px;}

        .player-list {
            margin: 15px 0; text-align: left; background: #09090b; border-radius: 8px;
            padding: 10px; max-height: 180px; overflow-y: auto; border: 1px solid #2f3542;
        }
        .player-item { display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px solid #2f3542; }
        .player-item:last-child { border-bottom: none; }
        .status-ready { color: var(--accent-green); font-weight: bold;}
        .status-not { color: #ffa502; font-weight: bold;}

        .hud-header { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        .hud-card {
            background: rgba(26, 26, 36, 0.85); padding: 10px 16px; border-radius: 30px;
            font-weight: bold; border: 1px solid rgba(255,255,255,0.05); display: flex; gap: 8px;
        }
        #timer-display { font-size: 1.3rem; color: #ffa502; font-family: monospace; }

        #blind-overlay {
            position: absolute; inset: 0; background: #000; z-index: 15;
            display: none; flex-direction: column; align-items: center; justify-content: center;
        }
        #blind-overlay h2 { color: var(--accent-red); font-size: 2.5rem; animation: pulse 1s infinite alternate; }
        @keyframes pulse { from { opacity: 0.4; } to { opacity: 1; } }

        /* Canvas layered beneath UI */
        #gameCanvas { 
            position: absolute; top: 0; left: 0; 
            display: none; width: 100%; height: 100%; 
            z-index: 1;
        }

        /* --- Mobile Controls --- */
        .mobile-controls {
            display: none; justify-content: space-between;
            align-items: flex-end; width: 100%; padding-bottom: 20px;
        }
        #joystick-zone {
            width: 120px; height: 120px; background: rgba(255,255,255,0.05);
            border-radius: 50%; position: relative; border: 2px solid rgba(255,255,255,0.1);
        }
        #joystick-nub {
            width: 50px; height: 50px; background: rgba(255,255,255,0.3);
            border-radius: 50%; position: absolute; top: 35px; left: 35px; pointer-events: none;
        }
        #action-pad { display: flex; flex-direction: column; gap: 15px; }
        .action-btn {
            width: 70px; height: 70px; border-radius: 50%; background: rgba(30, 144, 255, 0.6);
            border: 2px solid var(--accent-blue); color: white; font-weight: bold; font-size: 0.9rem;
        }

        @media (pointer: coarse) { .mobile-controls { display: flex; } }
    </style>
</head>
<body>

    <div id="blind-overlay">
        <h2>YOU ARE BLINDED</h2>
        <p style="text-align:center;">Hiders are blending into the environment.<br>Stand by...</p>
    </div>

    <div id="ui-layer">
        <div class="hud-header">
            <div class="hud-card"><span id="role-badge">Spectator</span></div>
            <div class="hud-card" style="border-color: #ffa502;">⏱️ <span id="timer-display">00:00</span></div>
            <button id="btn-leave" class="interactive leave">Exit Match</button>
        </div>
        <div class="mobile-controls">
            <div id="joystick-zone" class="interactive"><div id="joystick-nub"></div></div>
            <div id="action-pad" class="interactive"><button class="action-btn" id="btn-action-disguise">PROP</button></div>
        </div>
    </div>

    <div id="menu-screen" class="menu-screen">
        <div class="menu-card">
            <h1>3D Hide & Hunt</h1>
            <p>Third-Person WebRTC Prototype</p>
            <div class="form-group">
                <button id="btn-host">Host New Session</button>
                <div style="font-size:0.8rem; margin: 5px 0;">— OR —</div>
                <input type="text" id="input-room-id" placeholder="4-DIGIT CODE" maxlength="4">
                <button id="btn-join" class="secondary">Join Room</button>
            </div>
            <div id="status-msg" style="margin-top:15px; font-size:0.85rem; color: var(--accent-blue);"></div>
        </div>
    </div>

    <div id="lobby-screen" class="menu-screen" style="display: none;">
        <div class="menu-card">
            <h2 id="lobby-title" style="color: var(--accent-blue);">LOBBY ROOM</h2>
            <p id="lobby-subtitle">Waiting for all players...</p>
            <div class="player-list" id="player-list-container"></div>
            <div class="form-group">
                <button id="btn-lobby-action" class="success">Mark Ready</button>
                <button id="btn-lobby-leave" class="secondary" style="margin-top: 5px;">Leave Lobby</button>
            </div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>

    <script>
        // ==========================================
        // 1. GLOBAL STATE & VARIABLES
        // ==========================================
        const HIDING_DURATION = 20;
        const ROUND_DURATION = 90;
        
        let gameState = { phase: 'LOBBY', timer: 0, players: {} };
        let peer = null;
        let connections = [];
        let connToHost = null;
        let isHost = false;
        let myId = null;
        let amIReady = false;
        let gameLoopInterval = null;

        let localPos = { x: 0, z: 0 };
        let localRotY = 0;
        let localDisguise = { type: 'player', size: 2, color: 0x2ed573 };
        let keys = {};
        
        let playerMeshes = {}; // Three.js objects tracking

        // ==========================================
        // 2. THREE.JS ENGINE SETUP
        // ==========================================
        const canvas = document.getElementById('gameCanvas');
        const renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb); // Sky blue
        scene.fog = new THREE.Fog(0x87ceeb, 20, 100);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);

        const ambientLight = new THREE.AmbientLight(0x404040, 0.6);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(10, 20, 10);
        scene.add(dirLight);

        const gridHelper = new THREE.GridHelper(200, 50, 0x444444, 0x888888);
        scene.add(gridHelper);

        const mapProps3D = [
            { x: 10, z: -15, type: 'box', size: 3, color: 0x8B4513 },
            { x: -20, z: -10, type: 'cylinder', size: 2, color: 0x556B2F },
            { x: 15, z: 20, type: 'box', size: 4, color: 0x8B4513 },
            { x: -10, z: 25, type: 'sphere', size: 3, color: 0x696969 },
            { x: 0, z: -30, type: 'cylinder', size: 2.5, color: 0x556B2F }
        ];

        mapProps3D.forEach(prop => {
            let geo, mat;
            mat = new THREE.MeshLambertMaterial({ color: prop.color });
            if (prop.type === 'box') geo = new THREE.BoxGeometry(prop.size, prop.size, prop.size);
            if (prop.type === 'cylinder') geo = new THREE.CylinderGeometry(prop.size/2, prop.size/2, prop.size);
            if (prop.type === 'sphere') geo = new THREE.SphereGeometry(prop.size/1.5, 16, 16);
            
            let mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(prop.x, prop.size/2, prop.z);
            scene.add(mesh);
        });

        function resize3D() {
            if (!renderer) return;
            renderer.setSize(window.innerWidth, window.innerHeight);
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
        }
        window.addEventListener('resize', resize3D);
        resize3D();

        function animate() {
            requestAnimationFrame(animate);
            if (gameState.phase !== 'LOBBY' && document.getElementById('gameCanvas').style.display === 'block') {
                render3DScene();
            }
        }
        animate(); 

        // ==========================================
        // 3. INPUT CONTROLS
        // ==========================================
        window.addEventListener('keydown', (e) => { 
            keys[e.key.toLowerCase()] = true; 
            if(e.key === ' ') handleDisguiseSwap();
        });
        window.addEventListener('keyup', (e) => { keys[e.key.toLowerCase()] = false; });

        // Touch Joysticks
        const joyZone = document.getElementById('joystick-zone');
        const joyNub = document.getElementById('joystick-nub');
        let joyActive = false; let touchVector = { x: 0, y: 0 };

        joyZone.addEventListener('touchstart', (e) => { joyActive = true; handleJoystick(e); });
        joyZone.addEventListener('touchmove', (e) => { if(joyActive) handleJoystick(e); });
        joyZone.addEventListener('touchend', () => { joyActive = false; touchVector = { x: 0, y: 0 }; joyNub.style.transform = `translate(0px, 0px)`; });

        document.getElementById('btn-action-disguise').addEventListener('touchstart', (e) => {
            e.preventDefault(); handleDisguiseSwap();
        });

        function handleJoystick(e) {
            e.preventDefault();
            const touch = e.touches[0];
            const rect = joyZone.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            
            let dx = touch.clientX - centerX; let dy = touch.clientY - centerY;
            const dist = Math.hypot(dx, dy); const maxDist = rect.width / 2;
            if (dist > maxDist) { dx = (dx / dist) * maxDist; dy = (dy / dist) * maxDist; }

            joyNub.style.transform = `translate(${dx}px, ${dy}px)`;
            touchVector = { x: dx / maxDist, y: dy / maxDist };
        }

        // ==========================================
        // 4. LOBBY UI & MATCHMAKING
        // ==========================================
        function generate4DigitCode() { return Math.floor(1000 + Math.random() * 9000).toString(); }

        document.getElementById('btn-lobby-action').addEventListener('click', () => {
            if (isHost) {
                startGameTransition();
            } else {
                amIReady = !amIReady;
                document.getElementById('btn-lobby-action').innerText = amIReady ? "Unready" : "Mark Ready";
                document.getElementById('btn-lobby-action').className = amIReady ? "secondary" : "success";
                if(connToHost && connToHost.open) connToHost.send({ type: 'lobbyReady', readyState: amIReady });
            }
        });

        function startGameTransition() {
            gameState.phase = 'HIDING';
            gameState.timer = HIDING_DURATION;
            connections.forEach(conn => {
                if(conn.open) conn.send({ type: 'gameStart', gameState });
            });
            transitionUItoGame();
        }

        function transitionUItoGame() {
            document.getElementById('lobby-screen').style.display = 'none';
            document.getElementById('menu-screen').style.display = 'none';
            document.getElementById('ui-layer').style.display = 'flex';
            document.getElementById('gameCanvas').style.display = 'block';
            
            // Force browser to recalculate dimensions immediately
            setTimeout(() => { resize3D(); }, 50);
        }

        function updateLobbyUI() {
            const container = document.getElementById('player-list-container');
            container.innerHTML = "";

            const players = Object.keys(gameState.players);
            let totalHidersCount = 0; let readyHidersCount = 0;

            players.forEach((id, index) => {
                const p = gameState.players[id];
                const item = document.createElement('div');
                item.className = 'player-item';
                
                let displayName = id === myId ? "You" : `Player ${index + 1}`;
                let statusText = p.isReady ? "READY" : "NOT READY";
                let statusClass = p.isReady ? "status-ready" : "status-not";
                
                if (p.role === 'Seeker') {
                    displayName += " [Host/Hunter]"; statusText = "HOST"; statusClass = "status-ready";
                } else {
                    totalHidersCount++; if(p.isReady) readyHidersCount++;
                }

                item.innerHTML = `<span>${displayName}</span><span class="${statusClass}">${statusText}</span>`;
                container.appendChild(item);
            });

            if (isHost) {
                const actionBtn = document.getElementById('btn-lobby-action');
                actionBtn.innerText = "Start Game";
                if (totalHidersCount > 0 && readyHidersCount === totalHidersCount) {
                    actionBtn.disabled = false; actionBtn.className = "success";
                } else {
                    actionBtn.disabled = true;
                }
            }
        }

        // Host Connection Setup
        document.getElementById('btn-host').addEventListener('click', () => {
            document.getElementById('status-msg').innerText = "Starting engine...";
            isHost = true; 
            let shortCode = generate4DigitCode();
            
            peer = new Peer('hnh3d-' + shortCode);
            peer.on('open', (id) => {
                myId = id;
                document.getElementById('menu-screen').style.display = 'none';
                document.getElementById('lobby-screen').style.display = 'flex';
                document.getElementById('lobby-title').innerText = `ROOM CODE: ${shortCode}`;
                initHostLogic();
            });
            peer.on('error', (err) => {
                if(err.type === 'unavailable-id') document.getElementById('btn-host').click(); 
                else { alert("Network issue: " + err.type); exitRoom(); }
            });
        });

        // Client Connection Setup
        document.getElementById('btn-join').addEventListener('click', () => {
            const inputCode = document.getElementById('input-room-id').value.trim();
            if (inputCode.length !== 4) return alert("Enter exactly 4 digits.");

            document.getElementById('status-msg').innerText = "Connecting...";
            isHost = false;
            
            peer = new Peer();
            peer.on('open', (id) => {
                myId = id;
                connToHost = peer.connect('hnh3d-' + inputCode);
                connToHost.on('open', () => {
                    document.getElementById('menu-screen').style.display = 'none';
                    document.getElementById('lobby-screen').style.display = 'flex';
                    document.getElementById('lobby-title').innerText = `ROOM CODE: ${inputCode}`;
                    initClientLogic();
                });
                setTimeout(() => { if(!connToHost || !connToHost.open) { alert("Room not found."); exitRoom(); } }, 4000);
            });
        });

        document.getElementById('btn-leave').addEventListener('click', exitRoom);
        document.getElementById('btn-lobby-leave').addEventListener('click', exitRoom);

        function exitRoom() {
            if (peer) peer.destroy();
            if (gameLoopInterval) clearInterval(gameLoopInterval);
            
            for(let id in playerMeshes) { scene.remove(playerMeshes[id]); }
            playerMeshes = {};
            
            connections = []; connToHost = null; isHost = false; amIReady = false;
            gameState.phase = 'LOBBY'; gameState.players = {};

            document.getElementById('gameCanvas').style.display = 'none';
            document.getElementById('ui-layer').style.display = 'none';
            document.getElementById('lobby-screen').style.display = 'none';
            document.getElementById('blind-overlay').style.display = 'none';
            document.getElementById('menu-screen').style.display = 'flex';
        }

        // ==========================================
        // 5. ENGINE LOGIC & SYNC
        // ==========================================
        function initHostLogic() {
            gameState.phase = 'LOBBY';
            gameState.players[myId] = { 
                x: 0, z: 0, rotY: 0, role: 'Seeker', isCaught: false, isReady: true,
                disguiseType: 'player', disguiseSize: 2, color: 0xff4757 
            };
            updateLobbyUI();

            peer.on('connection', (conn) => {
                if (gameState.phase !== 'LOBBY') { conn.on('open', () => conn.close()); return; }
                connections.push(conn);
                
                gameState.players[conn.peer] = { 
                    x: Math.random() * 20 - 10, z: Math.random() * 20 - 10, rotY: 0, 
                    role: 'Hider', isCaught: false, isReady: false,
                    disguiseType: 'player', disguiseSize: 2, color: 0x2ed573 
                };
                updateLobbyUI();

                conn.on('data', (data) => {
                    if (data.type === 'lobbyReady') {
                        gameState.players[conn.peer].isReady = data.readyState; updateLobbyUI();
                    }
                    if (data.type === 'clientMove' && gameState.players[conn.peer]) {
                        let p = gameState.players[conn.peer];
                        if(!p.isCaught) {
                            p.x = data.x; p.z = data.z; p.rotY = data.rotY;
                            p.disguiseType = data.disguiseType; p.disguiseSize = data.disguiseSize; p.color = data.color;
                        }
                    }
                });

                conn.on('close', () => {
                    delete gameState.players[conn.peer];
                    connections = connections.filter(c => c.peer !== conn.peer); updateLobbyUI();
                });
            });

            // Master Match Time Clock
            setInterval(() => {
                if(gameState.phase === 'LOBBY' || gameState.phase === 'ENDED') return;
                gameState.timer--;
                if (gameState.timer <= 0) {
                    if (gameState.phase === 'HIDING') {
                        gameState.phase = 'HUNTING'; gameState.timer = ROUND_DURATION;
                    } else if (gameState.phase === 'HUNTING') {
                        gameState.phase = 'ENDED'; alert("Time expired! Hiders Win."); exitRoom();
                    }
                }
            }, 1000);

            // Network Loop
            gameLoopInterval = setInterval(() => {
                if(gameState.phase === 'LOBBY') {
                    connections.forEach(conn => { if (conn.open) conn.send({ type: 'lobbySync', players: gameState.players }); });
                    return;
                }

                handleLocalMovement();
                gameState.players[myId].x = localPos.x;
                gameState.players[myId].z = localPos.z;
                gameState.players[myId].rotY = localRotY;

                if (gameState.phase === 'HUNTING') checkCollisions();

                connections.forEach(conn => { if (conn.open) conn.send({ type: 'sync', gameState }); });
                updateVisualHUD();
            }, 1000 / 60);
        }

        function initClientLogic() {
            localPos = { x: Math.random() * 20 - 10, z: Math.random() * 20 - 10 };
            
            connToHost.on('data', (data) => {
                if (data.type === 'lobbySync') { gameState.players = data.players; updateLobbyUI(); }
                if (data.type === 'gameStart') { gameState = data.gameState; transitionUItoGame(); }
                if (data.type === 'sync') {
                    gameState = data.gameState;
                    if (gameState.phase !== 'LOBBY') { updateVisualHUD(); }
                }
            });

            connToHost.on('close', () => { alert("Host left the match."); exitRoom(); });

            gameLoopInterval = setInterval(() => {
                if(gameState.phase === 'LOBBY' || gameState.phase === 'ENDED') return;
                handleLocalMovement();
                if(connToHost && connToHost.open) {
                    connToHost.send({
                        type: 'clientMove', x: localPos.x, z: localPos.z, rotY: localRotY,
                        disguiseType: localDisguise.type, disguiseSize: localDisguise.size, color: localDisguise.color
                    });
                }
            }, 1000 / 60);
        }

        function handleLocalMovement() {
            let pData = gameState.players[myId];
            if (!pData || pData.isCaught) return;
            if (gameState.phase === 'HIDING' && pData.role === 'Seeker') return;

            const moveSpeed = 0.3; const rotSpeed = 0.05;

            if (keys['a'] || keys['arrowleft']) localRotY += rotSpeed;
            if (keys['d'] || keys['arrowright']) localRotY -= rotSpeed;
            if (keys['w'] || keys['arrowup']) { localPos.x -= Math.sin(localRotY) * moveSpeed; localPos.z -= Math.cos(localRotY) * moveSpeed; }
            if (keys['s'] || keys['arrowdown']) { localPos.x += Math.sin(localRotY) * moveSpeed; localPos.z += Math.cos(localRotY) * moveSpeed; }

            if (localPos.x < -100) localPos.x = -100; if (localPos.x > 100) localPos.x = 100;
            if (localPos.z < -100) localPos.z = -100; if (localPos.z > 100) localPos.z = 100;
        }

        function handleDisguiseSwap() {
            let pData = gameState.players[myId];
            if (!pData || pData.role !== 'Hider' || pData.isCaught) return;

            for (let prop of mapProps3D) {
                let dist = Math.hypot(localPos.x - prop.x, localPos.z - prop.z);
                if (dist < prop.size * 2 + 2) {
                    localDisguise.type = prop.type; localDisguise.size = prop.size; localDisguise.color = prop.color; return;
                }
            }
            localDisguise.type = 'player'; localDisguise.size = 2; localDisguise.color = 0x2ed573;
        }

        function checkCollisions() {
            const players = Object.values(gameState.players);
            const seeker = players.find(p => p.role === 'Seeker');
            if (!seeker) return;

            for (let id in gameState.players) {
                let target = gameState.players[id];
                if (target.role === 'Hider' && !target.isCaught) {
                    let dist = Math.hypot(seeker.x - target.x, seeker.z - target.z);
                    if (dist < (target.disguiseSize + 2)) {
                        gameState.players[id].isCaught = true; checkWinConditions();
                    }
                }
            }
        }

        function checkWinConditions() {
            const players = Object.values(gameState.players);
            const hidersLeft = players.filter(p => p.role === 'Hider' && !p.isCaught).length;
            if (hidersLeft === 0 && players.filter(p => p.role === 'Hider').length > 0) {
                gameState.phase = 'ENDED'; alert("Seeker Wins! All props found."); exitRoom();
            }
        }

        function updateVisualHUD() {
            const me = gameState.players[myId];
            if (!me) return;

            document.getElementById('role-badge').innerText = `${me.role.toUpperCase()} ${me.isCaught ? '(CAUGHT)' : ''}`;
            document.getElementById('role-badge').style.color = me.role === 'Seeker' ? 'var(--accent-red)' : 'var(--accent-green)';

            let m = Math.floor(gameState.timer / 60).toString().padStart(2, '0');
            let s = (gameState.timer % 60).toString().padStart(2, '0');
            document.getElementById('timer-display').innerText = `${gameState.phase}: ${m}:${s}`;

            document.getElementById('blind-overlay').style.display = (gameState.phase === 'HIDING' && me.role === 'Seeker') ? 'flex' : 'none';
        }

        // ==========================================
        // 6. RENDER 3D SCENE GRAPH (FIXED GEOMETRY)
        // ==========================================
        function render3DScene() {
            if (!gameState || !gameState.players) return; 

            // Remove disconnected players
            for (let id in playerMeshes) {
                if (!gameState.players[id]) { scene.remove(playerMeshes[id]); delete playerMeshes[id]; }
            }

            for (let id in gameState.players) {
                let p = gameState.players[id];
                
                // Rebuild mesh if disguise changed
                if (playerMeshes[id] && playerMeshes[id].userData.disguiseType !== p.disguiseType) {
                    scene.remove(playerMeshes[id]); delete playerMeshes[id];
                }

                if (!playerMeshes[id]) {
                    let geo, mat;
                    let pColor = p.isCaught ? 0x333333 : p.color;

                    if (p.role === 'Seeker') { 
                        geo = new THREE.BoxGeometry(2, 4, 2); 
                    } else {
                        if (p.disguiseType === 'box') geo = new THREE.BoxGeometry(p.disguiseSize, p.disguiseSize, p.disguiseSize);
                        else if (p.disguiseType === 'cylinder') geo = new THREE.CylinderGeometry(p.disguiseSize/2, p.disguiseSize/2, p.disguiseSize);
                        else if (p.disguiseType === 'sphere') geo = new THREE.SphereGeometry(p.disguiseSize/1.5, 16, 16);
                        // THIS WAS CRASHING THE GAME. Replaced CapsuleGeometry with a universally supported Cylinder.
                        else geo = new THREE.CylinderGeometry(1, 1, 3, 16); 
                    }

                    mat = new THREE.MeshLambertMaterial({ color: pColor });
                    let mesh = new THREE.Mesh(geo, mat);
                    mesh.userData = { disguiseType: p.disguiseType };
                    scene.add(mesh);
                    playerMeshes[id] = mesh;
                }

                // Sync 3D position
                let meshHeight = (p.role === 'Seeker' || p.disguiseType === 'player') ? 2 : p.disguiseSize/2;
                playerMeshes[id].position.set(p.x, meshHeight, p.z);
                playerMeshes[id].rotation.y = p.rotY;
            }

            // Camera chases the local player
            if (gameState.players[myId]) {
                const camDistance = 15;
                const camHeight = 8;
                
                camera.position.x = localPos.x + Math.sin(localRotY) * camDistance;
                camera.position.z = localPos.z + Math.cos(localRotY) * camDistance;
                camera.position.y = camHeight;
                
                camera.lookAt(localPos.x, 2, localPos.z);
            }

            renderer.render(scene, camera);
        }
    </script>
