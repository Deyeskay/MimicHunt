<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2a2438"/>
      <stop offset="1" stop-color="#15131c"/>
    </linearGradient>
    <linearGradient id="rain" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff5a5a"/>
      <stop offset="0.33" stop-color="#ffd35a"/>
      <stop offset="0.66" stop-color="#46e06a"/>
      <stop offset="1" stop-color="#4aa3ff"/>
    </linearGradient>
  </defs>

  <!-- Rounded app tile -->
  <rect x="16" y="16" width="480" height="480" rx="104" fill="url(#bg)"/>

  <!-- Rainbow ground band (nods to the level theme) -->
  <rect x="56" y="356" width="400" height="40" rx="20" fill="url(#rain)" opacity="0.95"/>

  <!-- The "mimic" bush hiding a hider -->
  <g>
    <circle cx="210" cy="300" r="92" fill="#3aa75a"/>
    <circle cx="158" cy="318" r="60" fill="#2f8f4c"/>
    <circle cx="262" cy="320" r="66" fill="#46c167"/>
    <!-- peeking eyes -->
    <circle cx="190" cy="292" r="15" fill="#fff"/>
    <circle cx="236" cy="292" r="15" fill="#fff"/>
    <circle cx="193" cy="295" r="7" fill="#15131c"/>
    <circle cx="239" cy="295" r="7" fill="#15131c"/>
  </g>

  <!-- Seeker's magnifier scanning -->
  <g transform="rotate(18 340 210)">
    <circle cx="340" cy="200" r="78" fill="none" stroke="#ffd35a" stroke-width="22"/>
    <circle cx="340" cy="200" r="55" fill="#4aa3ff" opacity="0.25"/>
    <rect x="392" y="248" width="34" height="120" rx="17" fill="#ffd35a" transform="rotate(45 409 308)"/>
  </g>
</svg>
