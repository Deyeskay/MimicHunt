<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D P2P Hide & Hunt</title>
    <link rel="stylesheet" href="css/style.css?v=3">
</head>
<body>

    <div id="custom-modal" class="modal-overlay">
        <div class="modal-card">
            <h2 id="modal-title">Title</h2>
            <p id="modal-msg">Message</p>
            <button id="modal-btn" class="success">OK</button>
        </div>
    </div>

    <div id="blind-overlay">
        <h2>YOU ARE BLINDED</h2>
        <p style="text-align:center;">Hiders are blending into the environment.<br>Stand by...</p>
    </div>

    <div id="ui-layer">
        <div class="hud-header">
            <div class="hud-card"><span id="role-badge">Spectator</span></div>
            <div class="hud-card" style="border-color: #ffa502;">⏱️ <span id="timer-display">00:00</span></div>
            <div class="hud-card" style="border-color: var(--accent-blue);">👥 <span id="player-count">1</span></div>
            <div class="hud-card" id="combat-hud" style="border-color: var(--accent-blue); display:none;">🔫 <span id="ammo-display">4/4</span> · ⭐ <span id="score-display">0</span></div>
            <div class="hud-card" id="health-hud" style="border-color: var(--accent-green); display:none;">❤ <div class="hp-track"><div id="hp-fill" class="hp-fill"></div></div></div>
            <button id="btn-leave" class="interactive leave">Exit Match</button>
        </div>

        <div id="crosshair"></div>

        <div id="mouse-hint" style="position:absolute; top: 50px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.5); padding: 5px 15px; border-radius: 20px; font-size: 0.8rem; display: none;">
            Click screen to Lock Mouse. Press ESC to unlock.
        </div>

        <div class="mobile-controls">
            <div id="joystick-zone" class="interactive"><div id="joystick-nub"></div></div>
            <div id="action-pad" class="interactive" style="flex-direction: row; gap: 10px;">
                <button class="action-btn" id="btn-action-jump">JUMP</button>
                <button class="action-btn" id="btn-action-disguise" style="background: var(--accent-red); border-color: #ff6b81;">PROP (F)</button>
                <button class="action-btn" id="btn-action-shoot" style="background: rgba(73,182,255,0.6); border-color: var(--accent-blue); display:none;">SHOOT</button>
            </div>
        </div>
    </div>

    <div id="menu-screen" class="menu-screen">
        <div class="menu-card">
            <h1>3D Hide & Hunt</h1>
            <p>Modular WebRTC Prototype</p>
            <button id="btn-settings" class="secondary" style="margin-bottom:15px;">⚙ Settings</button>
            <div class="form-group">
                <input type="text" id="input-player-name" placeholder="YOUR NAME" maxlength="16" style="margin-bottom:10px;">
                <button id="btn-host">Host New Session</button>
                <div style="font-size:0.8rem; margin: 5px 0;">— OR —</div>
                <input type="text" id="input-room-id" placeholder="4-DIGIT CODE" maxlength="4">
                <button id="btn-join" class="secondary">Join Room</button>
            </div>
            <div id="status-msg" style="margin-top:15px; font-size:0.85rem; color: var(--accent-blue);"></div>
        </div>
    </div>

    <div id="settings-screen" class="menu-screen" style="display:none;"> 
        <div class="menu-card"> 
            <h2>Settings</h2> 
            <div class="form-group"> 
                <label>Hiding Time (sec)</label>
                <input id="setting-hide-time" type="number" value="20"> 
                <label>Hunting Time (sec)</label>
                <input id="setting-hunt-time" type="number" value="90"> 
                <label>Mouse Sensitivity</label>
                <input id="setting-sensitivity" type="number" step="0.001" value="0.002"> 
                <label>
                    <input id="setting-invert-y" type="checkbox">
                    Invert Camera
                </label> 
                <label>
                    <input id="setting-mobile-ui" type="checkbox" checked>
                    Show Mobile Controls
                </label> 
                <button id="btn-save-settings" class="success"> Save </button> 
                <button id="btn-back-menu" class="secondary"> Back </button> 
            </div>
        </div>
    </div>

    <div id="lobby-screen" class="menu-screen" style="display: none;">
        <div class="menu-card">
            <h2 id="lobby-title" style="color: var(--accent-blue);">LOBBY ROOM</h2>
            <p id="lobby-subtitle">Waiting for all players...</p>
            <div id="lobby-level"></div>
            <div class="player-list" id="player-list-container"></div>
            <div id="lobby-warning" style="color: var(--accent-red); font-size: 0.85rem; min-height: 1.1em; margin: 6px 0;"></div>
            <div class="form-group">
                <button id="btn-lobby-action" class="success">Mark Ready</button>
                <button id="btn-lobby-leave" class="secondary" style="margin-top: 5px;">Leave Lobby</button>
            </div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/utils/SkeletonUtils.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>

    <script src="js/globals.js?v=22"></script>
    <script src="js/prefabs.js?v=22"></script>
    <script src="js/props.js?v=22"></script>
    <script src="js/ui.js?v=22"></script>
    <script src="js/levels/registry.js?v=22"></script>
    <!-- Level files are loaded dynamically from registry.js (LEVEL_FILES). -->
    <script src="js/level.js?v=22"></script>
    <script src="js/mechanics.js?v=22"></script>
    <script src="js/network.js?v=22"></script>
    <script src="js/app.js?v=22"></script>
</body>
</html>
