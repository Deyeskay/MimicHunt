<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P Hide & Hunt (Prop/Chameleon Style)</title>
    <style>
        body {
            margin: 0;
            background: #1e1e24;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        h1 { margin: 5px 0; font-size: 1.8rem; color: #e54b4b; }
        .setup-panel {
            background: #2b2b36;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            margin-bottom: 15px;
            display: flex;
            gap: 15px;
            align-items: center;
        }
        button {
            background: #e54b4b;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        button:hover { background: #f76c6c; }
        input {
            padding: 8px;
            border-radius: 4px;
            border: 1px solid #555;
            background: #111;
            color: white;
        }
        #room-id {
            background: #111;
            padding: 5px 10px;
            border-radius: 4px;
            font-family: monospace;
            color: #4cd137;
        }
        canvas {
            background: #111216;
            border: 4px solid #2b2b36;
            border-radius: 4px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }
        .instructions {
            margin-top: 10px;
            font-size: 0.9rem;
            color: #aaa;
        }
    </style>
</head>
<body>

    <h1>P2P Hide & Hunt</h1>
    
    <div class="setup-panel">
        <div>
            <button id="btn-host">Host Game</button>
            <span id="room-id">Click Host to get ID</span>
        </div>
        <div style="border-left: 2px solid #444; height: 30px;"></div>
        <div>
            <input type="text" id="input-room-id" placeholder="Paste Host ID here">
            <button id="btn-join">Join Game</button>
        </div>
    </div>

    <canvas id="gameCanvas" width="800" height="500"></canvas>

    <div class="instructions">
        <strong>Controls:</strong> Arrow Keys to Move. <br>
        <strong>Hiders (Green):</strong> Stand close to a gray map prop and press <strong>SPACEBAR</strong> to disguise yourself as that shape! <br>
        <strong>Seekers (Red):</strong> Run into green hiders to catch them.
    </div>

    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let peer = null;
        let connections = []; 
        let connToHost = null; 
        let isHost = false;
        let myId = null;

        // Static environmental shapes scattered across the map
        const mapProps = [
            { x: 150, y: 120, size: 40, type: 'square' },
            { x: 200, y: 350, size: 25, type: 'circle' },
            { x: 550, y: 150, size: 30, type: 'square' },
            { x: 600, y: 380, size: 45, type: 'circle' },
            { x: 400, y: 250, size: 35, type: 'square' }
        ];

        // Central state container
        let gameState = {
            players: {} 
        };

        // Client-side local control coordinates
        let localPos = { x: 50, y: 50 };
        let localDisguise = { type: 'player', size: 15 }; 
        let keys = {};

        // Track user input
        window.addEventListener('keydown', (e) => { keys[e.key] = true; });
        window.addEventListener('keyup', (e) => { keys[e.key] = false; });

        // --- NETWORKING INTERFACES ---

        document.getElementById('btn-host').addEventListener('click', () => {
            isHost = true;
            peer = new Peer();
            peer.on('open', (id) => {
                myId = id;
                document.getElementById('room-id').innerText = `ID: ${id}`;
                initHostLogic();
            });
        });

        document.getElementById('btn-join').addEventListener('click', () => {
            const hostId = document.getElementById('input-room-id').value.trim();
            if (!hostId) return alert("Please enter a Host Room ID");

            isHost = false;
            peer = new Peer();
            peer.on('open', (id) => {
                myId = id;
                connToHost = peer.connect(hostId);
                initClientLogic();
            });
        });

        // --- HOST SYSTEM ---
        function initHostLogic() {
            // Spawn host as seeker (Red)
            gameState.players[myId] = { 
                x: 100, y: 100, role: 'Seeker', isCaught: false, 
                disguiseType: 'player', disguiseSize: 15 
            };

            peer.on('connection', (conn) => {
                connections.push(conn);
                
                // Spawn arriving clients as Hiders (Green)
                gameState.players[conn.peer] = { 
                    x: 400 + Math.random()*200, y: 200 + Math.random()*200, 
                    role: 'Hider', isCaught: false,
                    disguiseType: 'player', disguiseSize: 15 
                };

                conn.on('data', (data) => {
                    if (data.type === 'clientUpdate' && gameState.players[conn.peer]) {
                        let p = gameState.players[conn.peer];
                        if (!p.isCaught) { // Dead players can't move
                            p.x = data.x;
                            p.y = data.y;
                            p.disguiseType = data.disguiseType;
                            p.disguiseSize = data.disguiseSize;
                        }
                    }
                });
            });

            // Master state loop
            setInterval(() => {
                handleLocalMovement();
                
                // Keep host data fresh inside state
                gameState.players[myId].x = localPos.x;
                gameState.players[myId].y = localPos.y;

                checkRulesAndCollisions();

                // Broadcast network updates
                connections.forEach(conn => {
                    if (conn.open) conn.send({ type: 'sync', gameState });
                });

                render();
            }, 1000 / 40);
        }

        // --- CLIENT SYSTEM ---
        function initClientLogic() {
            // Assign hider starting zone locally
            localPos = { x: 500 + Math.random()*100, y: 300 + Math.random()*100 };

            connToHost.on('data', (data) => {
                if (data.type === 'sync') {
                    gameState = data.gameState;
                    
                    // If host marked this client as caught, freeze them
                    if (gameState.players[myId] && gameState.players[myId].isCaught) {
                        localDisguise.type = 'square';
                        localDisguise.size = 20;
                    }
                    render();
                }
            });

            // Push updates upward to host
            setInterval(() => {
                if (gameState.players[myId] && gameState.players[myId].isCaught) return; // Stop if caught

                handleLocalMovement();
                handleDisguiseSwap();

                if (connToHost && connToHost.open) {
                    connToHost.send({
                        type: 'clientUpdate',
                        x: localPos.x,
                        y: localPos.y,
                        disguiseType: localDisguise.type,
                        disguiseSize: localDisguise.size
                    });
                }
            }, 1000 / 40);
        }

        // --- CORE MECHANICS ---

        function handleLocalMovement() {
            // Freeze movement if local player is caught
            if (gameState.players[myId] && gameState.players[myId].isCaught) return;

            const speed = 4;
            if (keys['ArrowUp'] || keys['w']) localPos.y -= speed;
            if (keys['ArrowDown'] || keys['s']) localPos.y += speed;
            if (keys['ArrowLeft'] || keys['a']) localPos.x -= speed;
            if (keys['ArrowRight'] || keys['d']) localPos.x += speed;

            // Canvas Boundary Collisions
            if (localPos.x < 20) localPos.x = 20;
            if (localPos.x > canvas.width - 20) localPos.x = canvas.width - 20;
            if (localPos.y < 20) localPos.y = 20;
            if (localPos.y > canvas.height - 20) localPos.y = canvas.height - 20;
        }

        function handleDisguiseSwap() {
            if (keys[' ']) { // Spacebar pressed
                keys[' '] = false; // Prevent rapid continuous switching
                
                // Check if standing next to a map prop
                for (let prop of mapProps) {
                    let dist = Math.hypot(localPos.x - prop.x, localPos.y - prop.y);
                    if (dist < 50) { // Interaction zone
                        localDisguise.type = prop.type;
                        localDisguise.size = prop.size;
                        return;
                    }
                }
                // Reset to default character if spacebar is clicked in the open field
                localDisguise.type = 'player';
                localDisguise.size = 15;
            }
        }

        function checkRulesAndCollisions() {
            const players = Object.keys(gameState.players);
            let seekerId = players.find(id => gameState.players[id].role === 'Seeker');
            if (!seekerId) return;

            let seeker = gameState.players[seekerId];

            players.forEach(id => {
                let p = gameState.players[id];
                if (p.role === 'Hider' && !p.isCaught) {
                    let dist = Math.hypot(seeker.x - p.x, seeker.y - p.y);
                    // Match radius boundaries
                    if (dist < (p.disguiseSize + 15)) { 
                        p.isCaught = true; 
                    }
                }
            });
        }

        // --- GRAPHICS RENDER ---

        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw Environmental Props
            mapProps.forEach(prop => {
                ctx.fillStyle = '#4a4a5a';
                ctx.beginPath();
                if (prop.type === 'square') {
                    ctx.fillRect(prop.x - prop.size/2, prop.y - prop.size/2, prop.size, prop.size);
                } else {
                    ctx.arc(prop.x, prop.y, prop.size, 0, Math.PI * 2);
                    ctx.fill();
                }
            });

            // Draw Active Players
            for (let id in gameState.players) {
                const p = gameState.players[id];
                
                if (p.role === 'Seeker') {
                    // Hunters are rendered as distinctive Red Rings/Circles
                    ctx.fillStyle = '#e54b4b';
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, 16, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = '#fff';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                } else {
                    // Hiders process shapes dynamically
                    if (p.isCaught) {
                        ctx.fillStyle = '#222'; // Caught/Eliminated players turn dark gray
                    } else {
                        // In a true implementation, you'd hide the color 'green' from seekers. 
                        // For this demo foundation, hiders show green profiles.
                        ctx.fillStyle = (id === myId) ? '#4cd137' : '#00a8ff'; 
                    }

                    ctx.beginPath();
                    if (p.disguiseType === 'square') {
                        ctx.fillRect(p.x - p.disguiseSize/2, p.y - p.disguiseSize/2, p.disguiseSize, p.disguiseSize);
                    } else if (p.disguiseType === 'circle') {
                        ctx.arc(p.x, p.y, p.disguiseSize, 0, Math.PI * 2);
                        ctx.fill();
                    } else {
                        // Base format player shape
                        ctx.arc(p.x, p.y, 14, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
            }
        }
    </script>
</body>
</html>
